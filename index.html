<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open WhatsApp</title>

<script>

const wa =
"https://wa.me/6285353090944?text=%42%6F%6C%65%68%20%6D%69%6E%74%61%20%6C%69%73%74%20%2B%20%70%65%6E%6A%65%6C%61%73%61%6E%20%64%69%6B%69%74%20%66%69%74%75%72%6E%79%61%20%2B%20%73%79%61%72%61%74%20%64%65%76%69%63%65%20%6D%69%6E";

function openChrome() {

window.location.href =
"intent://" +
wa.replace("https://","") +
"#Intent;scheme=https;package=com.android.chrome;end";

setTimeout(() => {
window.location.href = wa;
}, 2000);

}

window.onload = () => {

const ua = navigator.userAgent;

if (
ua.includes("TikTok") ||
ua.includes("Instagram") ||
ua.includes("Telegram")
) {

document.body.innerHTML = `
<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:sans-serif;
background:#111;
color:white;
">

<h2>Buka di Browser</h2>

<button onclick="openChrome()"
style="
padding:15px 25px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
">
Open in Chrome
</button>

</div>
`;

} else {

window.location.href = wa;

}

};

</script>
</head>
<body>
</body>
</html>
