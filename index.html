<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Browser</title>

<script>

const wa =
"https://api.whatsapp.com/send?phone=6285353090944&text=Boleh%20minta%20list%20%2B%20penjelasan%20dikit%20fiturnya%20%2B%20syarat%20device%20min";

const ua = navigator.userAgent.toLowerCase();

const isInApp =
ua.includes("tiktok") ||
ua.includes("musical_ly") ||
ua.includes("instagram") ||
ua.includes("telegram") ||
ua.includes("fbav") ||
ua.includes("fb_iab");

function openChrome() {

window.location.href =
"intent://" +
wa.replace("https://","") +
"#Intent;scheme=https;package=com.android.chrome;end";

setTimeout(() => {
window.location.href = wa;
}, 1500);

}

window.onload = () => {

if (isInApp) {

document.body.innerHTML = `
<div style="
background:#111;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:sans-serif;
color:white;
">

<h2>Buka di Browser</h2>

<button onclick="openChrome()"
style="
padding:15px 30px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
">
Open in Chrome
</button>

</div>
`;

} else {

window.location.href = wa;

}

};

</script>
</head>

<body>
</body>
</html>
